name: GridMind CI

# This workflow runs automatically on every push to any branch
# and on every Pull Request targeting 'main'
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Backend: Python Linting + Tests ────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    services:
      # Spin up a real PostgreSQL for integration tests
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: gridmind_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: gridmind_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Spin up Redis for Celery/cache tests
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements/base.txt \
                      -r requirements/ml.txt \
                      -r requirements/dev.txt

      - name: Lint with ruff
        working-directory: backend
        run: ruff check .

      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: gridmind_test
          POSTGRES_USER: gridmind_user
          POSTGRES_PASSWORD: testpassword
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test_secret_key_for_ci_only
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  # ─── Frontend: TypeScript Build Check ───────────────────────────────────────
  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test -- --watchAll=false
