# alembic.ini — Configuration file for Alembic (DB migration tool)
# This file is read by Alembic CLI when you run: alembic upgrade head

[alembic]
# The path to the migrations directory
script_location = alembic

# Database URL — overridden programmatically in alembic/env.py
# (reads from .env via core/config.py — don't put real credentials here)
sqlalchemy.url = postgresql://gridmind_user:changeme@localhost:5432/gridmind

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
